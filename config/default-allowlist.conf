# Devbox firewall — default allowed domains
#
# One domain per line. Lines starting with # are comments.
#
# SEMANTICS: Each entry matches the domain AND ALL its subdomains.
#   foo.com    → foo.com, www.foo.com, api.foo.com, anything.foo.com
#   *.foo.com  → identical to foo.com (the `*.` prefix is cosmetic)
#
# There is no "exact only" form. dnsmasq's --ipset directive (which we use
# to populate the iptables ipset at DNS lookup time) always matches the
# domain plus its subdomain tree. See docs/adr/0001-dnsmasq-dynamic-allowlist.md.
#
# This file is the seed copied into ~/.config/devbox/allowed-domains.conf
# on first run. Missing entries are merged into existing user files when
# devbox starts. User-added entries are preserved.

