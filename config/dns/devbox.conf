# devbox dnsmasq runtime config.
#
# Baked-in template copied to ~/.config/devbox/dns/devbox.conf on install.
# Mounted read-only into the devbox-dns container. See ADR 0007.
#
# Authoritative-only resolver for the `.test` TLD. Non-`.test` queries are
# refused (no-resolv), so a misconfigured host resolver fails visibly rather
# than silently leaking lookups upstream.
#
# We deliberately do NOT set `listen-address`. Per dnsmasq(8), specifying a
# listen-address filters incoming packets by destination IP and disables the
# automatic loopback bind — `listen-address=0.0.0.0` therefore accepts only
# packets destined for IP 0.0.0.0 (none) and drops everything, including
# 127.0.0.1. Default behavior (wildcard bind, accept on every interface) is
# what we want; reachability is constrained by the docker `127.0.0.1:53:53`
# loopback-only host port publish, not by dnsmasq-level filtering.
#
# Similarly, `local-service` is omitted: it has no effect without
# `bind-interfaces`, and the loopback-only publish already restricts the
# attack surface to host-local processes.

no-resolv
no-poll
local=/test/
address=/test/127.0.0.1
log-queries
