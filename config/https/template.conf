# Devbox HTTPS state — managed by devbox.
#
# Reference template documenting the schema parsed by lib/https.sh. The live
# file at ~/.config/devbox/https.conf is written incrementally by
# devbox::write_https_field; this template is intentionally not copied 1:1 on
# install (the loader treats every key as optional and falls back to defined
# defaults, so a missing file is indistinguishable from "all defaults").
#
# Safe to delete the live file to reset to defaults.

# Whether HTTPS routing is currently switched on. Phase 4 of the HTTPS rollout
# is what flips this; until then everything else may be populated while
# devbox continues to serve HTTP only. See ADR 0008.
active=false

# Set to `true` after a user declines the Phase 6 upgrade prompt. Suppresses
# future `devbox update` re-prompts; the user can still re-opt-in via
# `dns-install --enable-https`.
optout=false

# sha256 of mkcert's rootCA.pem at the time `dns-install` ran. A change here
# invalidates every issued leaf cert and triggers regeneration in Phase 3's
# _cert::should_regenerate.
ca_fingerprint=

# Version of the mkcert binary that produced the CA. Recorded so
# `dns-status` can flag a stale install.
mkcert_version=

# ISO-8601 UTC timestamp of the install (e.g. 2026-05-13T14:32:01Z).
ca_installed_at=

# Comma-separated list of trust stores currently holding the CA. Values come
# from a fixed taxonomy: linux, macos, windows. Phase 1 only ever writes
# `linux` or `macos`; Phase 6 will additively append `windows` after the WSL2
# UAC-driven Windows-side install.
ca_installed_platforms=
