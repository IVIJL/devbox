# Codex CLI managed config — registers the container-only identity
# context hook (ADR 0011 Layer 3). Uses UserPromptSubmit because Codex
# 0.128 does not yet document a SessionStart event; the script's
# identity-file guard keeps the per-turn cost zero on host and minimal
# inside the container. Future work: migrate to SessionStart once Codex
# publishes it (see ADR 0011 § Future work).
[hooks]
UserPromptSubmit = [
    { hooks = [{ type = "command", command = "bash /usr/local/bin/devbox-identity-context.sh" }] }
]
